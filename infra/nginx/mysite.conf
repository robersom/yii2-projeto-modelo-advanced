
# --Nginx config example (sites-available)

# --- FRONTEND (mysite.test) ---
server {
    charset utf-8;
    client_max_body_size 128M;

    listen 80;
    server_name mysite.test;
    root /var/www/projeto-modelo-advanced/frontend/web;
    index index.php;

    access_log /var/log/nginx/frontend-access.log;
    error_log  /var/log/nginx/frontend-error.log;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock; # PHP version
    }

    location ~ /\.(ht|svn|git) {
        deny all;
    }
}

# --- BACKEND (admin.mysite.test) ---
server {
    charset utf-8;
    client_max_body_size 128M;

    listen 80;
    server_name admin.mysite.test;
    root /var/www/projeto-modelo-advanced/backend/web;
    index index.php;

    access_log /var/log/nginx/backend-access.log;
    error_log  /var/log/nginx/backend-error.log;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }

    location ~ /\.(ht|svn|git) {
        deny all;
    }
}